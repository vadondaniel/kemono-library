{% extends "base.html" %}
{% block content %}
<section class="panel">
  <h1>Edit Creator</h1>

  <form method="post" class="form" data-nav-replace-redirect>
    <label class="field-label" for="name">Creator name</label>
    <input class="field" id="name" name="name" required value="{{ creator['name'] }}">

    <label class="field-label" for="description">Description</label>
    <textarea class="field" id="description" name="description" rows="4" placeholder="Optional description">{{ creator['description'] or '' }}</textarea>

    <label class="field-label" for="tags_text">Tags</label>
    <input class="field" id="tags_text" name="tags_text" value="{{ creator['tags_text'] or '' }}" placeholder="tag one, tag two">

    <button type="submit">Save creator</button>
  </form>
</section>

<section class="panel">
  <h2>Danger zone</h2>
  <form method="post" action="{{ url_for('delete_creator', creator_id=creator['id']) }}" class="inline-form" onsubmit="return confirm('Delete this creator and all imported posts?');">
    <button type="submit" class="btn btn--ghost btn--danger-quiet">Delete creator</button>
  </form>
</section>
{% endblock %}
