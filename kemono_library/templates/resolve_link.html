{% extends "base.html" %}
{% block content %}
<section class="panel">
  <h1>Linked Post Not In Local Library</h1>
  <p>
    Could not find local copy for
    <code>{{ service }}/{{ external_user_id or '?' }}/{{ external_post_id }}</code>.
  </p>
  <p>
    <a class="btn btn-link" href="{{ import_url }}">Import this linked post</a>
  </p>
</section>
{% endblock %}
